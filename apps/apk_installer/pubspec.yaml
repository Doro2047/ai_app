name: apk_installer
description: "APK Batch Installer - A standalone Flutter Windows desktop app for batch APK installation via ADB."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Shared core package
  shared_core:
    path: ../../packages/shared_core

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.6.4

  # Storage
  hive_flutter: ^1.1.0

  # File picker
  file_picker: ^6.1.1

  # Process execution
  process_run: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
