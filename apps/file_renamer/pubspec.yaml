name: file_renamer
description: "Batch file rename tool - Flutter Windows desktop application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  shared_core:
    path: ../../packages/shared_core
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  file_picker: ^6.1.1
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  get_it: ^7.6.4
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
