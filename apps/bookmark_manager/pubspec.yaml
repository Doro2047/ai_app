name: bookmark_manager
description: "Bookmark Manager - A standalone Flutter Windows desktop application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  shared_core:
    path: ../../packages/shared_core

  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  file_picker: ^6.1.1
  hive_flutter: ^1.1.0
  get_it: ^7.6.4
  dio: ^5.4.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
