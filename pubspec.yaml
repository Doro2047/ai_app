name: flutter_box
description: FlutterBox - Flutter效率工具箱 | 一款基于Flutter的跨平台桌面/移动工具集
publish_to: 'none'
homepage: 'https://github.com/Doro2047/FlutterBox'
repository: 'https://github.com/Doro2047/FlutterBox'

version: 3.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^13.0.0
  get_it: ^7.6.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  file_picker: ^8.0.0
  dio: ^5.4.0
  intl: ^0.20.2
  logging: ^1.2.0
  permission_handler: ^11.3.0
  permission_handler_windows: ^0.2.1
  crypto: ^3.0.3
  process_run: ^1.2.2+1
  uuid: ^4.3.3
  equatable: ^2.0.5
  path: ^1.9.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1
  go_router_builder: ^4.3.0

  # Testing dependencies
  bloc_test: ^9.1.5
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

# Flutter Launcher Icons 配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
