name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Executables
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter pillow psutil requests pydantic

      - name: Build APK批量安装工具
        run: |
          pyinstaller --name "APK批量安装工具" --onefile --windowed --add-data "shared;shared" "APK安装目录/源代码/main.py" --icon "APK安装目录/源代码/APK批量安装工具.ico"
        continue-on-error: true

      - name: Build FREE工具箱
        run: |
          pyinstaller --name "FREE工具箱" --onefile --windowed --add-data "shared;shared" "FREE工具箱/run.py" --icon "shared/icons/FREE工具箱.ico"
        continue-on-error: true

      - name: Build Edge书签管理器
        run: |
          pyinstaller --name "Edge书签管理器" --onefile --windowed --add-data "shared;shared" "edge书签管理器/源代码/main.py" --icon "edge书签管理器/源代码/Edge书签管理器.ico"
        continue-on-error: true

      - name: Build ImageClassifier
        run: |
          pyinstaller --name "ImageClassifier" --onefile --windowed --add-data "shared;shared" "ImageClassifier/main.py"
        continue-on-error: true

      - name: Build 批量扩展名修改器
        run: |
          pyinstaller --name "批量扩展名修改器" --onefile --windowed --add-data "shared;shared" "批量扩展名修改器/源代码/main.py" --icon "批量扩展名修改器/源代码/批量扩展名修改器.ico"
        continue-on-error: true

      - name: Build 批量文件查重清理工具
        run: |
          pyinstaller --name "批量文件查重清理工具" --onefile --windowed --add-data "shared;shared" "批量文件查重清理工具/源代码/main.py" --icon "批量文件查重清理工具/源代码/批量文件查重清理工具.ico"
        continue-on-error: true

      - name: Build 批量重命名工具
        run: |
          pyinstaller --name "批量重命名工具" --onefile --windowed --add-data "shared;shared" "批量重命名工具/源代码/main.py" --icon "批量重命名工具/源代码/批量重命名工具.ico"
        continue-on-error: true

      - name: Build 文件扫描器
        run: |
          pyinstaller --name "文件扫描器" --onefile --windowed --add-data "shared;shared" "文件扫描器/源代码/main.py" --icon "文件扫描器/源代码/文件扫描器.ico"
        continue-on-error: true

      - name: Build 文件移动工具
        run: |
          pyinstaller --name "文件移动工具" --onefile --windowed --add-data "shared;shared" "文件移动工具/源代码/main.py" --icon "文件移动工具/源代码/文件移动工具.ico"
        continue-on-error: true

      - name: Build 系统时间管理与设备控制工具
        run: |
          pyinstaller --name "系统时间管理与设备控制工具" --onefile --windowed --add-data "shared;shared" "系统时间管理与设备控制工具/源代码/main.py" --icon "系统时间管理与设备控制工具/源代码/系统时间管理与设备控制工具.ico"
        continue-on-error: true

      - name: List build outputs
        run: |
          Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-apps-builds
          path: dist/
          retention-days: 30
